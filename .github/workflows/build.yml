name: Build MayaWatchdog

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # Install MSYS2 (modern MinGW)
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc

    # Compile
    - name: Build EXE
      shell: msys2 {0}
      run: |
        g++ MayaWatchdog.cpp -o MayaWatchdog.exe \
          -mwindows \
          -luser32 -lgdi32 -lshell32 -lws2_32

    # Upload executable
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MayaWatchdog
        path: MayaWatchdog.exe
