name: Build Maya Manager

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Install MSYS2 (stable MinGW environment)
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >
          mingw-w64-x86_64-gcc

    # Compile EXE
    - name: Build Maya Manager
      shell: msys2 {0}
      run: |
        g++ MayaWatchdog.cpp \
        -o MayaManager.exe \
        -static \
        -static-libgcc \
        -static-libstdc++ \
        -mwindows \
        -luser32 \
        -lgdi32 \
        -lshell32

    # Upload EXE
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MayaManager
        path: MayaManager.exe
