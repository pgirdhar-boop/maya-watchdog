name: Build MayaWatchdog EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install MinGW (g++)
      - name: Install MinGW
        uses: egor-tensin/setup-mingw@v2
        with:
          platform: x64

      # 3️⃣ Compile EXE
      - name: Build MayaWatchdog
        shell: powershell
        run: |
          g++ MayaWatchdog.cpp -o MayaWatchdog.exe -mwindows -luser32 -lgdi32 -lshell32 -lws2_32

      # 4️⃣ Upload EXE as downloadable artifact
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MayaWatchdog
          path: MayaWatchdog.exe
