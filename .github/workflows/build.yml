name: Build Maya Watchdog

on: [push]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MinGW
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: mingw-w64-x86_64-gcc

    - name: Compile
      shell: msys2 {0}
      run: |
        g++ MayaWatchdog.cpp -o MayaWatchdog.exe \
        -static -static-libgcc -static-libstdc++ \
        -lpsapi -mwindows

    - name: Upload EXE
      uses: actions/upload-artifact@v4
      with:
        name: MayaWatchdog
        path: MayaWatchdog.exe
